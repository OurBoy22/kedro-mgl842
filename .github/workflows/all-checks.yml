name: Run all checks on Kedro

on:
  workflow_call:
    inputs:
      branch:
        type: string
        default: ''
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - '**.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - '**.md'

permissions:
  contents: read

jobs:
  unit-tests:
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]
        # Temporary: single Python version while validating CI report pipeline.
        # python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        python-version: [ "3.11" ]
    uses: ./.github/workflows/unit-tests.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      branch: ${{ inputs.branch }}
  e2e-tests:
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]
        # Temporary: single Python version while validating CI report pipeline.
        # python-version: [ "3.10", "3.11", "3.12", "3.13" ]
        python-version: [ "3.11" ]
    uses: ./.github/workflows/e2e-tests.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      branch: ${{ inputs.branch }}

  lint:
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.11" ]
    uses: ./.github/workflows/lint.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      branch: ${{ inputs.branch }}

  detect-secrets:
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.11" ]
    uses: ./.github/workflows/detect-secrets.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      branch: ${{ inputs.branch }}

  security-check:
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.11" ]
    uses: ./.github/workflows/security-check.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      branch: ${{ inputs.branch }}

  report:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - e2e-tests
      - lint
      - detect-secrets
      - security-check
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
      - name: Download summary artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: "*-summary-*"
      - name: Build consolidated report
        run: python tools/github_actions/generate_ci_report.py
        env:
          UNIT_TESTS_JOB_RESULT: ${{ needs.unit-tests.result }}
          E2E_TESTS_JOB_RESULT: ${{ needs.e2e-tests.result }}
          LINT_JOB_RESULT: ${{ needs.lint.result }}
          DETECT_SECRETS_JOB_RESULT: ${{ needs.detect-secrets.result }}
          SECURITY_CHECK_JOB_RESULT: ${{ needs.security-check.result }}
      - name: Post sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-report
          path: ci-report.md
